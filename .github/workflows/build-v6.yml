name: build-v6

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 */6 * *'
  push:
    branches:
      - "master"
    paths:
      - ".github/workflows/build-v6.yml"
      - "dev/v6/Dockerfile"
      - "dev/v6/entrypoint.sh"

jobs:
  build-v6:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Convert tags to lowercase
        run: |
          docker_name="${{ secrets.DOCKERHUB_USERNAME }}"
          repository="${{ github.repository }}"
          repo_name="${repository##*/}"

          dockerhub_tag="${docker_name}/${repo_name}"
          ghcr_tag="ghcr.io/${{ github.repository }}"

          echo "dockerhub_tag=${dockerhub_tag,,}" >> $GITHUB_ENV
          echo "ghcr_tag=${ghcr_tag,,}" >> $GITHUB_ENV
      - uses: docker/build-push-action@v7
        with:
          context: "{{defaultContext}}:dev/v6"
          file: Dockerfile
          push: true
          platforms: linux/arm, linux/arm64, linux/amd64, linux/ppc64le, linux/s390x, linux/riscv64
          tags: |
            ${{ env.dockerhub_tag }}:v6
            ${{ env.ghcr_tag }}:v6
